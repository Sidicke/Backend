<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Test WhatsApp Service</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e2e8f0;
    }
    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 46px; height: 46px;
      background: linear-gradient(135deg, #25d366, #128c7e);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
    }
    h1 { font-size: 20px; font-weight: 700; }
    p.subtitle { font-size: 13px; color: #94a3b8; }
    label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; margin-top: 20px; }
    input, textarea {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 15px;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus { border-color: #25d366; }
    textarea { resize: vertical; min-height: 100px; }
    .hint { font-size: 11px; color: #64748b; margin-top: 4px; }
    button {
      width: 100%;
      margin-top: 24px;
      padding: 14px;
      background: linear-gradient(135deg, #25d366, #128c7e);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #result {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .success { background: rgba(37,211,102,0.1); border: 1px solid #25d366; color: #25d366; }
    .error   { background: rgba(239,68,68,0.1);  border: 1px solid #ef4444;  color: #fca5a5; }
    .spinner {
      display: inline-block;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      width: 16px;
      height: 16px;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">💬</div>
      <div>
        <h1>WhatsApp Test <span style="color:#25d366">HOPITEL</span></h1>
        <p class="subtitle">Diagnostic du microservice Baileys en production</p>
      </div>
    </div>

    <label>Service URL</label>
    <input id="serviceUrl" type="text" value="https://whatsappservice-production-123f.up.railway.app" />

    <label>Numéro de téléphone</label>
    <input id="phone" type="tel" placeholder="Ex: 01970XXXXX ou 229970XXXXX" />
    <p class="hint">⚡ Le numéro sera normalisé automatiquement en format international (229XXXXXXXX)</p>

    <label>Message</label>
    <textarea id="message">Bonjour ! Ceci est un message de test du service HOPITEL. 🏥</textarea>

    <button id="sendBtn" onclick="sendTest()">Envoyer le test WhatsApp</button>

    <div id="result"></div>
  </div>

  <script>
    function formatPhone(raw) {
      // Nettoyage
      let cleaned = raw.replace(/\D/g, '');
      // Nouveau format Bénin (10 chiffres commençant par 01)
      if (cleaned.length === 10 && cleaned.startsWith('01')) {
        cleaned = '229' + cleaned.substring(2);
      }
      // 8 chiffres locaux
      else if (cleaned.length === 8) {
        cleaned = '229' + cleaned;
      }
      // Format international avec 229 + 01 (ex: 22901XXXXXXXX → 229XXXXXXXX)
      else if (cleaned.length === 11 && cleaned.startsWith('22901')) {
        cleaned = '229' + cleaned.substring(5);
      }
      return cleaned;
    }

    async function sendTest() {
      const btn = document.getElementById('sendBtn');
      const result = document.getElementById('result');
      const serviceUrl = document.getElementById('serviceUrl').value.trim().replace(/\/$/, '');
      const rawPhone = document.getElementById('phone').value.trim();
      const message = document.getElementById('message').value.trim();

      if (!rawPhone || !message) {
        showResult('error', '⚠️ Veuillez saisir le numéro et le message.');
        return;
      }

      const phone = formatPhone(rawPhone);

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Envoi en cours...';
      result.style.display = 'none';

      try {
        const response = await fetch(`${serviceUrl}/send-message`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, message })
        });

        const data = await response.json();

        if (response.ok && data.success !== false) {
          showResult('success',
            `✅ Message envoyé avec succès !\n\nNuméro normalisé : ${phone}\nStatut HTTP : ${response.status}\nRéponse :\n${JSON.stringify(data, null, 2)}`
          );
        } else {
          showResult('error',
            `❌ Envoi refusé par le service.\n\nNuméro normalisé : ${phone}\nStatut HTTP : ${response.status}\nRéponse :\n${JSON.stringify(data, null, 2)}`
          );
        }
      } catch (err) {
        showResult('error',
          `❌ Erreur réseau / CORS.\n\nNuméro normalisé : ${phone}\nErreur : ${err.message}\n\n💡 Si c'est une erreur CORS, essaie d'ouvrir le fichier dans le même domaine, ou teste directement via un outil comme Postman.`
        );
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Envoyer le test WhatsApp';
      }
    }

    function showResult(type, text) {
      const result = document.getElementById('result');
      result.className = type;
      result.textContent = text;
      result.style.display = 'block';
    }
  </script>
</body>
</html>
