<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: Arial, sans-serif; background: #f4f7fc; margin: 0; padding: 20px;">
  <div style="max-width: 600px; margin: auto; background: white; border-radius: 12px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
    <h1 style="color: #2563eb; font-size: 22px;">🏥 HOPITEL</h1>
    <h2 style="color: #1f2937; font-size: 18px;">Mise à jour de votre rendez-vous</h2>
    <p style="color: #4b5563; font-size: 15px;">Bonjour {{ patient_name }},</p>
    <p style="color: #4b5563; font-size: 15px;">Votre rendez-vous avec <strong>Dr. {{ doctor_name }}</strong> a été mis à jour.</p>
    <div style="background: #f9fafb; border-radius: 8px; padding: 15px; margin: 20px 0;">
      <p style="margin: 5px 0;"><strong>Date :</strong> {{ date }}</p>
      <p style="margin: 5px 0;"><strong>Heure :</strong> {{ heure }}</p>
      <p style="margin: 5px 0;"><strong>Statut :</strong> {{ statut }}</p>
      {% if motif %}
      <p style="margin: 5px 0; color: #ef4444;"><strong>Motif :</strong> {{ motif }}</p>
      {% endif %}
    </div>
    <hr style="border: none; border-top: 1px solid #e5e7eb; margin: 25px 0;">
    <p style="color: #9ca3af; font-size: 12px; text-align: center;">&copy; 2025 HOPITEL</p>
  </div>
</body>
</html>
