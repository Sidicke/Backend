<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: Arial, sans-serif; background: #f4f7fc; margin: 0; padding: 20px;">
  <div style="max-width: 600px; margin: auto; background: white; border-radius: 12px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
    <h1 style="color: #2563eb; font-size: 22px;">🏥 HOPITEL</h1>
    <h2 style="color: #1f2937; font-size: 18px;">Demande de service refusée</h2>
    <p style="color: #4b5563; font-size: 15px;">Bonjour {{ demande.demande_par.first_name }},</p>
    <p style="color: #4b5563; font-size: 15px;">Votre demande d'ajout du service <strong>« {{ service_nom }} »</strong> pour l'hôpital <strong>{{ demande.hopital.nom }}</strong> a été refusée.</p>
    {% if demande.commentaire %}
    <div style="background: #fef2f2; border-radius: 8px; padding: 15px; margin: 20px 0; border-left: 4px solid #ef4444;">
      <p style="margin: 0; color: #991b1b;"><strong>Motif :</strong> {{ demande.commentaire }}</p>
    </div>
    {% endif %}
    <hr style="border: none; border-top: 1px solid #e5e7eb; margin: 25px 0;">
    <p style="color: #9ca3af; font-size: 12px; text-align: center;">&copy; 2025 HOPITEL</p>
  </div>
</body>
</html>
