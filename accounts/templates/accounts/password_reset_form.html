<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialisation de mot de passe - E-Santé Bénin</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --error: #dc2626;
            --background: #f8fafc;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo {
            color: var(--primary);
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        h1 {
            font-size: 1.25rem;
            color: #1e293b;
            margin: 0;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #64748b;
            margin-bottom: 0.5rem;
        }
        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        .message {
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            display: none;
        }
        .message.success {
            background-color: #f0fdf4;
            color: var(--success);
            border: 1px solid #bbf7d0;
            display: block;
        }
        .message.error {
            background-color: #fef2f2;
            color: var(--error);
            border: 1px solid #fecaca;
            display: block;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="logo">E-Santé</div>
            <h1>Nouveau mot de passe</h1>
        </div>

        {% if success %}
        <div class="message success">
            Votre mot de passe a été réinitialisé avec succès. Vous pouvez maintenant fermer cette page et vous connecter sur l'application mobile.
        </div>
        {% else %}
        
        {% if error %}
        <div class="message error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="password">Nouveau mot de passe</label>
                <input type="password" id="password" name="new_password" required minlength="8">
            </div>
            <div class="form-group">
                <label for="confirm">Confirmer le mot de passe</label>
                <input type="password" id="confirm" name="confirm_password" required minlength="8">
            </div>
            <button type="submit">Réinitialiser</button>
        </form>
        {% endif %}
    </div>
</body>
</html>
